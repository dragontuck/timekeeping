################################################################################
# nginx.conf – Reverse Proxy with SSL Termination
# Serves:
#   https://web.timekeeping.local  → web container :3000
#   https://api.timekeeping.local  → api container :4000
#   http://*                       → redirect to https
################################################################################

user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ────────────────────────────────────────────────────────────────
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';
    access_log  /var/log/nginx/access.log  main;

    # ── Performance ────────────────────────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    gzip               on;
    gzip_vary          on;
    gzip_proxied       any;
    gzip_comp_level    6;
    gzip_types         text/plain text/css text/xml application/json
                       application/javascript application/xml+rss
                       application/atom+xml image/svg+xml;

    # ── Security ───────────────────────────────────────────────────────────────
    server_tokens          off;
    client_max_body_size   10m;
    proxy_hide_header      X-Powered-By;

    # ── SSL Shared Settings ────────────────────────────────────────────────────
    ssl_certificate      /etc/nginx/certs/timekeeping.crt;
    ssl_certificate_key  /etc/nginx/certs/timekeeping.key;
    ssl_session_timeout  1d;
    ssl_session_cache    shared:SSL:10m;
    ssl_session_tickets  off;
    ssl_protocols        TLSv1.2 TLSv1.3;
    ssl_ciphers          ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;

    # ── Rate Limiting Zones ────────────────────────────────────────────────────
    limit_req_zone  $binary_remote_addr  zone=api:10m    rate=100r/m;
    limit_req_zone  $binary_remote_addr  zone=auth:10m   rate=10r/m;

    # ── HTTP → HTTPS Redirect ─────────────────────────────────────────────────
    server {
        listen 80;
        server_name web.timekeeping.local api.timekeeping.local timekeeping.local;
        return 301 https://$host:2443$request_uri;
    }

    # ── Tier 1: React Web App ─────────────────────────────────────────────────
    server {
        listen 2443 ssl http2;
        server_name web.timekeeping.local;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options            "SAMEORIGIN"                          always;
        add_header X-Content-Type-Options     "nosniff"                             always;
        add_header Referrer-Policy            "strict-origin-when-cross-origin"     always;
        add_header Content-Security-Policy    "default-src 'self'; connect-src 'self' https://api.timekeeping.local:2443; img-src 'self' data:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; script-src 'self';" always;

        location / {
            proxy_pass         http://web:3000;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }
    }

    # ── Tier 2: Node/TS REST API ──────────────────────────────────────────────
    server {
        listen 2443 ssl http2;
        server_name api.timekeeping.local;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options           "DENY"                                always;
        add_header X-Content-Type-Options    "nosniff"                             always;
        add_header Referrer-Policy           "no-referrer"                         always;

        # Auth endpoints — tighter rate limit
        location ~ ^/auth/(login|refresh) {
            limit_req        zone=auth  burst=5  nodelay;
            limit_req_status 429;

            proxy_pass         http://api:4000;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # All other API endpoints
        location / {
            limit_req        zone=api  burst=20  nodelay;
            limit_req_status 429;

            proxy_pass         http://api:4000;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }
    }
}
