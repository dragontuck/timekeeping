services:
  # ─── Reverse Proxy / SSL Termination ──────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: timekeeping-nginx
    ports:
      - '280:80'
      - '2443:2443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      web:
        condition: service_started
      api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - timekeeping-net

  # ─── Tier 1: React SPA served by inner Nginx ──────────────────────────────
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      target: production
    container_name: timekeeping-web
    expose:
      - '3000'
    restart: unless-stopped
    networks:
      - timekeeping-net
    depends_on:
      - api

  # ─── Tier 2: Node / TypeScript REST API ───────────────────────────────────
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
      target: production
    container_name: timekeeping-api
    expose:
      - '4000'
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - timekeeping-net
    extra_hosts:
      # Allows the container to reach PostgreSQL running on the host machine
      - 'host.docker.internal:host-gateway'
    healthcheck:
      test: [ 'CMD', 'wget', '-qO-', 'http://localhost:4000/health' ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

networks:
  timekeeping-net:
    driver: bridge
